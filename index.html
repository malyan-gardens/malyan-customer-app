<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مليان | مشاريع النظام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #0d3b2c;
      --green-mid: #1a5c42;
      --green-soft: #e8f5ef;
      --sand: #f5f0e6;
      --gold: #c9a227;
      --white: #ffffff;
      --text: #1a1a1a;
      --text-soft: #4a4a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--sand);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--green-deep);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: var(--text-soft);
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
    }
    a.card {
      display: block;
      background: var(--white);
      border-radius: 20px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px rgba(13, 59, 44, 0.12);
      border: 2px solid transparent;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    a.card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(13, 59, 44, 0.18);
      border-color: var(--gold);
    }
    a.card .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    a.card h2 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--green-deep);
      margin-bottom: 0.5rem;
    }
    a.card p {
      font-size: 0.95rem;
      color: var(--text-soft);
      line-height: 1.5;
    }
    .logo {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--green-deep);
    }
    .logo span { color: var(--gold); }
    body { position: relative; }
  </style>
</head>
<body>
  <a href="#" class="logo">مليان <span>للحدائق</span></a>
  <h1>مشاريع مليان</h1>
  <p class="subtitle">اختر المشروع الذي تريد فتحه</p>
  <div class="cards">
    <a href="dashboard/index.html" class="card">
      <div class="icon">📊</div>
      <h2>لوحة التحكم</h2>
      <p>للإدارة وفاطمة — الطلبات، الفريق، الإحصائيات، المهام</p>
    </a>
    <a href="driver-app/index.html" class="card">
      <div class="icon">🚗</div>
      <h2>تطبيق السائق</h2>
      <p>للسائقين والفنيين — طلبات اليوم، العناوين، حالة التسليم</p>
    </a>
    <a href="customer-app/index.html" class="card">
      <div class="icon">🌿</div>
      <h2>تطبيق العميل</h2>
      <p>للعملاء — الخدمات، معرض النباتات، طلب استشارة وتواصل</p>
    </a>
  </div>
</body>
</html>
